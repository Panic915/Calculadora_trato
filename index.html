<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Trato</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      margin:0;
      padding:0;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .wrapper{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:15px;
      box-sizing:border-box;
    }

    .container{
      background:#fff;
      padding:20px;
      border-radius:12px;
      box-shadow:0 4px 15px rgba(0,0,0,.1);
      width:100%;
      max-width:420px;
      box-sizing:border-box;
    }

    /* TOPO COM LOGO */
    .topo{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      margin-bottom:20px;
    }

    .logo{
      width:55px;
      height:55px;
      object-fit:contain;
    }

    h2{
      margin:0;
      font-size:32px;
      font-weight:bold;
    }

    label{
      font-size:14px;
      font-weight:bold;
    }

    input, button{
      width:100%;
      padding:12px;
      margin:6px 0 12px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:14px;
      box-sizing:border-box;
    }

    button{
      background:#2e7d32;
      color:#fff;
      border:none;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      background:#1b5e20;
    }

    .resultado{
      margin-top:15px;
      background:#eef;
      padding:12px;
      border-radius:8px;
      font-size:14px;
      line-height:1.5;
    }
  </style>
</head>

<body>

<div class="wrapper">
  <div class="container">

    <!-- TOPO -->
    <div class="topo">
      <img src="logo.png" alt="Logo Confinamento" class="logo">
      <h2>Calculadora de Trato</h2>
    </div>

    <label>Total de animais inicial:</label>
    <input type="number" id="animais" value="20">

    <label>Animais que saíram:</label>
    <input type="number" id="saida" value="0">

    <label>Ração por dia (kg):</label>
    <input type="number" id="racao" value="547">

    <button onclick="calcular()">Calcular</button>

    <div class="resultado" id="resultado"></div>

  </div>
</div>

<script>

function calcular(){

  const animais = parseFloat(document.getElementById('animais').value) || 0;
  const saida = parseFloat(document.getElementById('saida').value) || 0;
  const racao = parseFloat(document.getElementById('racao').value) || 0;

  const animaisRestantes = animais - saida;

  if(animais <= 0 || racao <= 0){

    document.getElementById('resultado').innerHTML =
      'Preencha os dados corretamente.';

    return;
  }

  if(animaisRestantes <= 0){

    document.getElementById('resultado').innerHTML =
      'Erro: quantidade de animais restante inválida.';

    return;
  }

  const racaoPorAnimal = racao / animais;

  // consumo dos animais que saíram
  const consumoSaida = racaoPorAnimal * saida;

  // nova quantidade ajustada
  const racaoAjustada = racao - consumoSaida;

  let resultado =
    `<strong>➡ Restante a fornecer: ${racaoAjustada.toFixed(2)} kg</strong><br><br>`;

  // divisão dos tratos
  let t1 = racaoAjustada * 0.30;
  let t2 = racaoAjustada * 0.30;
  let t3 = racaoAjustada * 0.40;

  resultado += `
    1º Trato: ${t1.toFixed(2)} kg total → ${(t1/animaisRestantes).toFixed(2)} kg/cab<br>
    2º Trato: ${t2.toFixed(2)} kg total → ${(t2/animaisRestantes).toFixed(2)} kg/cab<br>
    3º Trato: ${t3.toFixed(2)} kg total → ${(t3/animaisRestantes).toFixed(2)} kg/cab
  `;

  document.getElementById('resultado').innerHTML = resultado;
}

</script>

</body>
</html>
